<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Debugger</title>

<style>
body {
    margin: 0;
    padding: 10px;
    background: #111;
    color: #ddd;
    font-family: Consolas, Monaco, monospace;
    font-size: 12px;
}

.row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
}

input,
button {
    font-family: inherit;
    font-size: 12px;
    background: #1b1b1b;
    color: #ddd;
    border: 1px solid #444;
    padding: 6px;
    box-sizing: border-box;
}

input {
    flex: 1;
}

button {
    cursor: pointer;
}

.status {
    margin-bottom: 6px;
}

.connected {
    color: #4caf50;
}

.disconnected {
    color: #ff5252;
}

#logs {
    height: calc(100vh - 125px);
    overflow: auto;
    border: 1px solid #444;
    background: #161616;
    padding: 4px;
}

.log-entry {
    border-bottom: 1px solid #222;
    padding: 4px 0;
}

.message-summary {
    cursor: pointer;
    color: #8ecfff;
    user-select: none;
    padding: 2px 0;
}

.message-content {
    padding-left: 18px;
}

details {
    margin: 1px 0;
}

summary {
    cursor: pointer;
    user-select: none;
    color: #7ec8ff;
    outline: none;
}

.tree-indent {
    padding-left: 18px;
}

.tree-leaf {
    padding-left: 18px;
    color: #dcdcdc;
    white-space: nowrap;
}

.key {
    color: #7ec8ff;
}

.string {
    color: #98c379;
}

.number {
    color: #d19a66;
}

.boolean {
    color: #c678dd;
}

.null {
    color: #888;
}

.plain-text {
    white-space: pre-wrap;
    color: #ddd;
    padding-left: 10px;
}

.truncated {
    color: #999;
    font-style: italic;
    padding-left: 18px;
}
</style>
</head>

<body>

<div class="row">
    <input
        id="wsUrl"
        value="wss://www.interactivebrokers.co.uk/portal.proxy/v1/portal/ws"
        placeholder="WebSocket URL">
</div>

<div class="row">
    <button onclick="connectWs()">Connect</button>
    <button onclick="disconnectWs()">Disconnect</button>
    <button onclick="clearLogs()">Clear Logs</button>
</div>

<div class="status">
    Status:
    <span id="status" class="disconnected">DISCONNECTED</span>
</div>

<div class="row">
    <input
        id="messageInput"
        placeholder='Example: smd+416904+{"fields":["31","84"]}'>
    <button onclick="sendMessage()">Send</button>
</div>

<div id="logs"></div>

<script>

let ws = null;

const logs = document.getElementById("logs");
const statusEl = document.getElementById("status");

const MAX_ARRAY_ITEMS = 100;
const MAX_OBJECT_KEYS = 200;

function timestamp() {
    return new Date().toLocaleTimeString();
}

function setStatus(text, connected) {
    statusEl.textContent = text;
    statusEl.className =
        connected
            ? "connected"
            : "disconnected";
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function primitiveHtml(value) {

    if (value === null) {
        return '<span class="null">null</span>';
    }

    if (typeof value === "string") {
        return `<span class="string">"${escapeHtml(value)}"</span>`;
    }

    if (typeof value === "number") {
        return `<span class="number">${value}</span>`;
    }

    if (typeof value === "boolean") {
        return `<span class="boolean">${value}</span>`;
    }

    return escapeHtml(String(value));
}

function createTree(value, key = null) {

    const primitive =
        value === null ||
        typeof value !== "object";

    if (primitive) {

        const leaf = document.createElement("div");
        leaf.className = "tree-leaf";

        if (key === null) {
            leaf.innerHTML =
                primitiveHtml(value);
        } else {
            leaf.innerHTML =
                `<span class="key">${escapeHtml(key)}</span>: ${primitiveHtml(value)}`;
        }

        return leaf;
    }

    const details =
        document.createElement("details");

    details.open = false;

    const summary =
        document.createElement("summary");

    let title;

    if (Array.isArray(value)) {

        title =
            key === null
                ? `Array(${value.length})`
                : `${key}: Array(${value.length})`;

    } else {

        title =
            key === null
                ? `Object(${Object.keys(value).length})`
                : `${key}: Object(${Object.keys(value).length})`;
    }

    summary.textContent = title;

    details.appendChild(summary);

    const body =
        document.createElement("div");

    body.className = "tree-indent";

    if (Array.isArray(value)) {

        const count =
            Math.min(
                value.length,
                MAX_ARRAY_ITEMS
            );

        for (
            let i = 0;
            i < count;
            i++
        ) {
            body.appendChild(
                createTree(value[i], `[${i}]`)
            );
        }

        if (value.length > count) {

            const truncated =
                document.createElement("div");

            truncated.className =
                "truncated";

            truncated.textContent =
                `... ${value.length - count} more items`;

            body.appendChild(truncated);
        }

    } else {

        const entries =
            Object.entries(value);

        const count =
            Math.min(
                entries.length,
                MAX_OBJECT_KEYS
            );

        for (
            let i = 0;
            i < count;
            i++
        ) {

            const [k, v] =
                entries[i];

            body.appendChild(
                createTree(v, k)
            );
        }

        if (
            entries.length > count
        ) {

            const truncated =
                document.createElement("div");

            truncated.className =
                "truncated";

            truncated.textContent =
                `... ${entries.length - count} more properties`;

            body.appendChild(truncated);
        }
    }

    details.appendChild(body);

    return details;
}

function addLog(type, message) {

    const entry =
        document.createElement("div");

    entry.className =
        "log-entry";

    const wrapper =
        document.createElement("details");

    wrapper.open = false;

    const summary =
        document.createElement("summary");

    summary.className =
        "message-summary";

    summary.textContent =
        `[${timestamp()}] [${type}]`;

    wrapper.appendChild(summary);

    const content =
        document.createElement("div");

    content.className =
        "message-content";

    try {

        const parsed =
            JSON.parse(message);

        content.appendChild(
            createTree(parsed)
        );

    } catch {

        const pre =
            document.createElement("div");

        pre.className =
            "plain-text";

        pre.textContent =
            message;

        content.appendChild(pre);
    }

    wrapper.appendChild(content);
    entry.appendChild(wrapper);

    logs.appendChild(entry);

    logs.scrollTop =
        logs.scrollHeight;
}

function connectWs() {

    const url =
        document
            .getElementById("wsUrl")
            .value
            .trim();

    if (!url) {
        addLog(
            "ERROR",
            "WebSocket URL required"
        );
        return;
    }

    if (ws) {
        ws.close();
    }

    addLog(
        "SYSTEM",
        `Connecting to ${url}`
    );

    try {

        ws =
            new WebSocket(url);

        ws.onopen = () => {

            setStatus(
                "CONNECTED",
                true
            );

            addLog(
                "SYSTEM",
                "WebSocket connected"
            );
        };

        ws.onmessage =
            async (event) => {

            try {

                let data =
                    event.data;

                if (
                    data instanceof Blob
                ) {
                    data =
                        await data.text();
                }

                if (
                    data instanceof ArrayBuffer
                ) {
                    data =
                        new TextDecoder()
                            .decode(data);
                }

                addLog(
                    "RECEIVE",
                    data
                );

            } catch (err) {

                addLog(
                    "ERROR",
                    err.message
                );
            }
        };

        ws.onerror = (err) => {

            addLog(
                "ERROR",
                JSON.stringify(err)
            );
        };

        ws.onclose = (event) => {

            setStatus(
                "DISCONNECTED",
                false
            );

            addLog(
                "SYSTEM",
                `WebSocket closed. Code=${event.code} Reason=${event.reason || "N/A"}`
            );
        };

    } catch (e) {

        addLog(
            "ERROR",
            e.message
        );
    }
}

function disconnectWs() {

    if (ws) {

        ws.close();
        ws = null;
    }
}

function sendMessage() {

    const input =
        document.getElementById(
            "messageInput"
        );

    const message =
        input.value;

    if (
        !ws ||
        ws.readyState !==
            WebSocket.OPEN
    ) {

        addLog(
            "ERROR",
            "WebSocket not connected"
        );

        return;
    }

    ws.send(message);

    addLog(
        "SEND",
        message
    );
}

function clearLogs() {
    logs.innerHTML = "";
}

</script>

</body>
</html>
