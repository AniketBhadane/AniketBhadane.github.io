<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebSocket Debugger</title>

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/json-viewer-js@1.0.1/dist/json-viewer.css"
/>

<style>
  body {
    margin: 0;
    padding: 10px;
    background: #111;
    color: #ddd;
    font-family: monospace;
    font-size: 11px;
  }

  .row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }

  input,
  button {
    font-family: monospace;
    font-size: 11px;
    background: #1b1b1b;
    color: #ddd;
    border: 1px solid #444;
    padding: 6px;
    box-sizing: border-box;
  }

  input {
    flex: 1;
  }

  button {
    cursor: pointer;
    min-width: 90px;
  }

  .status {
    margin-bottom: 6px;
  }

  .connected {
    color: #4caf50;
  }

  .disconnected {
    color: #ff5252;
  }

  #logs {
    height: calc(100vh - 120px);
    overflow-y: auto;
    overflow-x: auto;
    border: 1px solid #444;
    background: #151515;
    padding: 4px;
  }

  .log-entry {
    border-bottom: 1px solid #222;
    padding: 4px 0;
  }

  .log-header {
    cursor: pointer;
    user-select: none;
    color: #7ec8ff;
    margin-bottom: 4px;
  }

  .log-content {
    display: none;
    margin-left: 18px;
  }

  .log-content.open {
    display: block;
  }

  .plain-message {
    white-space: pre-wrap;
    color: #ddd;
    margin-top: 4px;
  }

  .json-viewer {
    background: transparent !important;
    color: #ddd !important;
  }

  .json-viewer-key {
    color: #7ec8ff !important;
  }

  .json-viewer-value-string {
    color: #8bc34a !important;
  }

  .json-viewer-value-number {
    color: #ffb74d !important;
  }

  .json-viewer-value-boolean {
    color: #ff8a65 !important;
  }

  .json-viewer-value-null {
    color: #999 !important;
  }
</style>
</head>

<body>

<div class="row">
  <input
    id="wsUrl"
    value="wss://www.interactivebrokers.co.uk/portal.proxy/v1/portal/ws"
    placeholder="WebSocket URL"
  />
</div>

<div class="row">
  <button onclick="connectWs()">Connect</button>
  <button onclick="disconnectWs()">Disconnect</button>
  <button onclick="clearLogs()">Clear Logs</button>
</div>

<div class="status">
  Status:
  <span id="status" class="disconnected">DISCONNECTED</span>
</div>

<div class="row">
  <input
    id="messageInput"
    placeholder='Message to send. Example: smd+416904+{"fields":["31","84"]}'
  />
  <button onclick="sendMessage()">Send</button>
</div>

<div id="logs"></div>

<script src="https://cdn.jsdelivr.net/npm/json-viewer-js@1.0.1/dist/json-viewer.js"></script>

<script>

let ws = null;

const logs = document.getElementById("logs");
const statusEl = document.getElementById("status");

function timestamp() {
  return new Date().toLocaleTimeString();
}

function setStatus(text, connected) {
  statusEl.textContent = text;
  statusEl.className = connected
    ? "connected"
    : "disconnected";
}

function addLog(type, message) {

  const entry = document.createElement("div");
  entry.className = "log-entry";

  const header = document.createElement("div");
  header.className = "log-header";

  header.textContent =
    `[${timestamp()}] [${type}]`;

  const content = document.createElement("div");
  content.className = "log-content";

  header.addEventListener("click", () => {
    content.classList.toggle("open");
  });

  try {

    const parsed = JSON.parse(message);

    const viewerContainer =
      document.createElement("div");

    content.appendChild(viewerContainer);

    const viewer = new JsonViewer({
      expanded: false,
      rootCollapsable: true
    });

    viewerContainer.appendChild(
      viewer.getContainer()
    );

    viewer.showJSON(parsed);

  } catch {

    const pre = document.createElement("div");
    pre.className = "plain-message";
    pre.textContent = message;

    content.appendChild(pre);
  }

  entry.appendChild(header);
  entry.appendChild(content);

  logs.appendChild(entry);

  logs.scrollTop = logs.scrollHeight;
}

function connectWs() {

  const url =
    document.getElementById("wsUrl").value.trim();

  if (!url) {
    addLog("ERROR", "WebSocket URL required");
    return;
  }

  if (ws) {
    ws.close();
  }

  addLog("SYSTEM", `Connecting to ${url}`);

  try {

    ws = new WebSocket(url);

    ws.onopen = () => {

      setStatus("CONNECTED", true);

      addLog(
        "SYSTEM",
        "WebSocket connected"
      );
    };

    ws.onmessage = async (event) => {

      try {

        let data = event.data;

        if (data instanceof Blob) {
          data = await data.text();
        }

        if (data instanceof ArrayBuffer) {
          data = new TextDecoder().decode(data);
        }

        addLog("RECEIVE", data);

      } catch (err) {

        addLog(
          "ERROR",
          err.message
        );
      }
    };

    ws.onerror = (err) => {

      addLog(
        "ERROR",
        JSON.stringify(err)
      );
    };

    ws.onclose = (event) => {

      setStatus(
        "DISCONNECTED",
        false
      );

      addLog(
        "SYSTEM",
        `WebSocket closed. Code=${event.code} Reason=${event.reason || "N/A"}`
      );
    };

  } catch (e) {

    addLog(
      "ERROR",
      e.message
    );
  }
}

function disconnectWs() {

  if (ws) {

    ws.close();
    ws = null;
  }
}

function sendMessage() {

  const input =
    document.getElementById("messageInput");

  const message = input.value;

  if (
    !ws ||
    ws.readyState !== WebSocket.OPEN
  ) {

    addLog(
      "ERROR",
      "WebSocket not connected"
    );

    return;
  }

  ws.send(message);

  addLog(
    "SEND",
    message
  );
}

function clearLogs() {
  logs.innerHTML = "";
}

</script>

</body>
</html>
